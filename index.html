<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monitor ESP32 MQTT</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.1.0/paho-mqtt.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
            margin-bottom: 20px;
        }
        .icon { font-size: 30px; }
        .btn-connect {
            background-color: #E53935; 
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-connect.connected {
            background-color: #4CAF50; 
        }
        
        .title-lab { color: #673AB7; margin: 5px 0; font-size: 18px; text-transform: uppercase; }
        .title-name { color: #4CAF50; margin: 5px 0; font-size: 18px; text-transform: uppercase; }
        .title-monitor { font-size: 24px; margin: 5px 0; font-weight: normal; }

        .progress-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 40px 0 20px 0;
        }
        svg.circular-progress {
            transform: rotate(-90deg);
            width: 160px;
            height: 160px;
        }
        circle.bg { fill: none; stroke: #e6e6e6; stroke-width: 12; }
        circle.fg {
            fill: none; stroke: #2196F3; stroke-width: 12;
            stroke-dasharray: 440; 
            stroke-dashoffset: 440;
            transition: stroke-dashoffset 0.4s ease-out;
        }
        .volt-text {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px; font-weight: bold; color: #333;
        }

        .subtitle { font-style: italic; font-weight: bold; font-size: 18px; margin-bottom: 30px; }

        .controls-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }
        .led-icon { font-size: 50px; }
        .switch-container { display: flex; flex-direction: column; align-items: center; gap: 10px;}
        .switch-text { font-size: 16px; font-weight: bold; }
        
        .round-checkbox {
            appearance: none;
            width: 50px; height: 50px;
            border: 2px solid #E53935;
            border-radius: 50%;
            outline: none; cursor: pointer;
            position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        .round-checkbox:checked {
            background-color: white;
            border-color: #E53935;
        }
        .round-checkbox:checked::after {
            content: '✔';
            color: #E53935;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <span class="icon">🚘</span>
        <button id="btnConnect" class="btn-connect">DESCONECTADO</button>
        <span class="icon">🚘</span>
    </div>
    
    <h3 class="title-lab">LABORATORIO ETN1022 MQTT</h3>
    <h3 class="title-name">MIGUEL ANGEL LOPEZ RODRIGUEZ</h3>
    <h2 class="title-monitor">MONITOR</h2>

    <div class="progress-container">
        <svg class="circular-progress">
            <circle class="bg" cx="80" cy="80" r="70"></circle>
            <circle class="fg" cx="80" cy="80" r="70" id="progressCircle"></circle>
        </svg>
        <div class="volt-text"><span id="lblVoltaje">0.00</span>V</div>
    </div>
    <div class="subtitle">POTENCIOMETRO</div>

    <div class="controls-container">
        <span class="led-icon">💡</span>
        <div class="switch-container">
            <span class="switch-text">ACTIVAR LUCES</span>
            <input type="checkbox" id="chkLuces" class="round-checkbox">
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
